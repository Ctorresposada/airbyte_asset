download-external-modules: false
framework:
  - all
quiet: true
skip-path:
  - .external_modules
  - .terraform
  - .terraform.lock.hcl
enable-secret-scan-all-files: true
skip-check:
  - CKV_TF_1  # "Ensure Terraform module sources use a commit hash"
  - CKV_TF_3  # "Ensure state files are locked" - Fails if backend config is passed in with the -backend-config flag

  # KMS key policy — standard AWS root-access pattern for key management
  - CKV_AWS_109  # Resource:* in KMS key policies refers to the key itself
  - CKV_AWS_111  # kms:* on Resource:* is standard for KMS key policies

  # Airbyte RDS (Postgres metadata database) — internal workload; HA/IAM-auth not justified
  - CKV_AWS_157  # Multi-AZ configurable via var.rds_multi_az; default off for cost optimization
  - CKV_AWS_293  # RDS deletion protection configurable via var.rds_deletion_protection
  - CKV_AWS_161  # Airbyte does not support IAM authentication for its internal PostgreSQL config database
  - CKV2_AWS_30  # Query logging on Airbyte internal config DB generates excessive volume with no security benefit

  # Airbyte ALB + networking
  - CKV_AWS_150  # ALB deletion protection intentionally omitted for teardown flexibility
  - CKV_AWS_91   # ALB access logging deferred; audit trail via CloudTrail
  - CKV2_AWS_28  # WAF not required for internal data-engineering tooling
  - CKV_AWS_341  # Launch template metadata hop limit > 1 required for Docker/kind containers

  # S3 — Airbyte logs/artifacts bucket
  - CKV_AWS_18   # Access logging not required; audit trail via CloudTrail
  - CKV_AWS_144  # Cross-region replication not required for log/artifact storage
  - CKV2_AWS_62  # S3 event notifications not required

  # Secrets Manager — manual rotation for Airbyte credentials
  - CKV2_AWS_57  # Automatic rotation requires a Lambda rotator and coordinated Airbyte restart

  # CloudWatch Log Groups
  - CKV_AWS_158  # CloudWatch log groups use CMK encryption via the module's KMS key

  # ACM certificate
  - CKV2_AWS_71  # Wildcard certificates may be used depending on deployment requirements

  # EKS cluster
  - CKV_AWS_39   # Public endpoint enabled intentionally for demo/CoE use; set endpoint_public_access=false for production
  - CKV_AWS_58   # EKS secrets encryption enabled via encryption_config block
  - CKV_AWS_37   # All control plane log types enabled via enabled_cluster_log_types
  - CKV_AWS_38   # Private access enabled (endpoint_private_access = true)
  - CKV_AWS_74   # EKS public endpoint access is intentional; restrict public_access_cidrs for production hardening
  - CKV_AWS_339  # EKS version is set via var.kubernetes_version; version currency is the caller's responsibility

  # EKS node group launch template
  - CKV_AWS_88   # Nodes are in private subnets; no public IP association needed
  - CKV_AWS_341  # hop_limit=2 required for IRSA token exchange from pods (same reason as EC2 variant)

  # EKS IAM — ALB controller policy uses Resource:* for read-only Describe actions
  - CKV_AWS_110  # ALB controller requires broad Describe permissions across ELB resources
  - CKV_AWS_111  # ALB controller requires broad read access; write actions are already resource-scoped
  - CKV_AWS_108  # ALB controller EC2/ELB read actions require Resource:* as AWS does not support resource-level restrictions

  # IAM and S3 — cross-module false positives
  - CKV_AWS_356  # Resource:* in KMS key policy means "this key" (AWS-required pattern); ALB controller read-only actions require Resource:*
  - CKV_AWS_145  # False positive — KMS SSE set via aws_s3_bucket_server_side_encryption_configuration; checkov cannot resolve the separate resource
