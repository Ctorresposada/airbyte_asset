download-external-modules: false
framework:
  - all
quiet: true
skip-path:
  - .external_modules
  - .terraform
  - .terraform.lock.hcl
  - .*.enc.*
  - terraform/ingestion/lambda/python
enable-secret-scan-all-files: true
skip-check:
  - CKV_TF_1  # "Ensure Terraform module sources use a commit hash"
  - CKV_TF_3  # "Ensure state files are locked" - Fails if backend config is passed in with the -backend-config flag.
  - CKV_TF_355  # "Ensure no IAM policies documents allow "*" as a statement's resource for restrictable actions"
  - CKV_AWS_18   # Access logging not required — audit trail handled via CloudTrail
  - CKV2_AWS_62  # Event notifications not required — pipeline monitoring handled via Airbyte
  - CKV_AWS_144  # Cross-region replication not required — no DR requirement per client data residency
  - CKV_AWS_145  # KMS encryption not required — using SSE-S3 (AES256) per project security requirements for now (KMS can be added later)
  - CKV_AWS_355  # Ensure no IAM policies documents allow "*" as a statement's resource for restrictable actions
  - CKV_AWS_356  # Sibling of CKV_AWS_355 — same wildcard-resource pattern for restrictable actions
  - CKV_AWS_338  # Log retention is environment-driven via var.redshift_log_retention_days — dev uses 30 days to control cost; prod sets >= 365
  - CKV_AWS_99   # Glue security configuration S3 encryption uses SSE-S3 (consistent with CKV_AWS_145 — KMS not required for security requirements)
  - CKV2_AWS_64  # KMS key policy not explicitly defined — key is used solely for Glue crawler CloudWatch log encryption with no cross-account access
  - CKV_AWS_109  # Resource:* in KMS key policies refers to the key itself — AWS-recommended root-access pattern for key management
  - CKV_AWS_111  # kms:* on Resource:* is standard for KMS key policies and does not grant unconstrained write access to other resources
  - CKV_SECRET_4  # False positive — matched string is a doc comment in urllib3 source (lambda layer dependency), not a real credential
  # False positive — OAuth token type URNs and constant names in google-auth source (lambda layer dependency)
  - CKV_SECRET_6
  # DataEngineer_Dev inline policy — broad permissions are intentional and dev-only; resource-level skip comments
  # in security/main.tf document the full rationale. Plan-file scanning does not honour inline skip annotations.
  - CKV_AWS_286  # Privilege escalation: iam:Put*/CreatePolicy*/UpdateAssumeRolePolicy required in dev account only
  - CKV_AWS_287  # Credentials exposure: secretsmanager:Get*/kms:Decrypt required for pipeline development in dev
  - CKV_AWS_288  # Data exfiltration: S3/Athena access is inherent to the data-engineering workflow in dev
  - CKV_AWS_289  # Permissions management: iam:Attach*/Put* required to iterate on roles in dev; not granted in prod
  - CKV_AWS_290  # Write access: ssm:*/athena:*/cloudshell:* wildcard writes scoped to dev inline policy only
