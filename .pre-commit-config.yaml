default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: mise run trufflehog-scan
        language: system
        stages: ["pre-commit", "pre-push"]
        pass_filenames: false
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        description: Check for formatting issues in the codebase
        entry: mise run lint
        language: system
        types: [python]
        stages: ["pre-commit", "pre-push"]
        pass_filenames: true
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [
          "--verbose"
        ]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2  # Get the latest from: https://github.com/antonbabenko/pre-commit-terraform/releases
    hooks:
      - id: terraform_fmt
        name: Terraform fmt
        description: Rewrites all Terraform configuration files to a canonical format.
        entry: hooks/terraform_fmt.sh
        language: script
        files: (\.tf|\.tfvars)$
        exclude: ^\.terraform/.*$|^\.external_modules/.*$

      - id: terraform_tflint
        name: Terraform validate with tflint
        description: Validates all Terraform configuration files with TFLint.
        require_serial: true
        entry: hooks/terraform_tflint.sh
        language: script
        files: (\.tf|\.tfvars)$
        exclude: ^\.terraform/.*$|^\.external_modules/.*$
        args:
          - --args=--config __GIT_WORKING_DIR__.config/.tflint.hcl

      - id: terraform_docs
        name: Terraform docs
        description: Inserts input and output documentation into README.md (using terraform-docs).
        require_serial: true
        entry: hooks/terraform_docs.sh
        language: script
        files: (\.tf|\.terraform\.lock\.hcl)$
        exclude: ^\.terraform/.*$|^\.external_modules/.*$

      - id: tfupdate
        name: auto update terraform providers
        args:
          - --args=lock
          - --args=--platform=linux_amd64
          - --args=--platform=linux_arm64
          - --args=--platform=darwin_amd64
          - --args=--platform=darwin_arm64

  - repo: https://github.com/bridgecrewio/checkov.git
    rev: '3.2.344'
    hooks:
      - id: checkov_diff
        entry: checkov --config-file ./.config/.checkov.yaml

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - -c=.config/.yamllint.yaml
          - --strict
