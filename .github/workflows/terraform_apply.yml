name: Terraform apply

on:
  workflow_call:
    inputs:
      terraform_version:
        type: string
        default: '1.11.3'
        description: Version of Terraform to install and use
      aws_role_arn:
        type: string
        description: AWS role to assume
      aws_region:
        type: string
        description: Target deployment region
      working_dir:
        type: string
        description: Working directory
      environment:
        type: string
        description: Target deployment environment

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read
  deployments: write

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: GitHubActions-TerraformApply-${{ github.run_id }}

      - name: Get PR number from merge commit
        id: get-pr
        run: |
          PR_NUMBER=$(gh pr list --search "${{ github.sha }}" --state merged --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "Error: Could not find PR number for this merge commit"
            echo "Cannot apply without verified plan artifact"
            exit 1
          else
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find workflow run for plan artifact
        id: find-workflow-run
        run: |
          # Extract stack name from working directory
          STACK_NAME=$(basename "${{ inputs.working_dir }}")
          PR_NUMBER="${{ steps.get-pr.outputs.number }}"
          ARTIFACT_NAME="tfplan-${STACK_NAME}-pr-${PR_NUMBER}-${{ inputs.environment }}"

          echo "Searching for artifact: $ARTIFACT_NAME from PR #${PR_NUMBER}"

          # Get the PR details to find associated workflow runs
          echo "Fetching PR details..."
          PR_HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} --jq '.head.sha' 2>&1)

          if [ $? -ne 0 ]; then
            echo "Error fetching PR details: $PR_HEAD_SHA"
            exit 1
          fi

          echo "PR head SHA: $PR_HEAD_SHA"

          # Search for the artifact across recent workflow runs
          echo "Searching for workflow run with artifact..."
          WORKFLOW_RUN_ID=$(gh api /repos/${{ github.repository }}/actions/artifacts \
            --paginate \
            --jq ".artifacts | map(select(.name == \"$ARTIFACT_NAME\")) | .[0].workflow_run.id" 2>&1)

          if [ $? -ne 0 ]; then
            echo "Error searching artifacts: $WORKFLOW_RUN_ID"
            echo "Falling back to workflow run search by SHA..."

            # Fallback: search workflow runs by head SHA
            WORKFLOW_RUN_ID=$(gh api /repos/${{ github.repository }}/actions/runs \
              --paginate \
              -F head_sha="$PR_HEAD_SHA" \
              -F status=completed \
              -F per_page=100 \
              --jq '.workflow_runs | map(select(.conclusion == "success")) | sort_by(.created_at) | reverse | .[0].id' 2>&1)

            if [ $? -ne 0 ]; then
              echo "Error: Failed to find workflow run: $WORKFLOW_RUN_ID"
              exit 1
            fi
          fi

          if [ -z "$WORKFLOW_RUN_ID" ] || [ "$WORKFLOW_RUN_ID" == "null" ]; then
            echo "Error: No workflow run found with artifact $ARTIFACT_NAME or matching SHA $PR_HEAD_SHA"
            exit 1
          fi

          echo "Found workflow run: $WORKFLOW_RUN_ID"
          echo "run-id=$WORKFLOW_RUN_ID" >> $GITHUB_OUTPUT
          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download Terraform plan artifact
        if: steps.find-workflow-run.outcome == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.find-workflow-run.outputs.artifact-name }}
          path: ${{ inputs.working_dir }}
          run-id: ${{ steps.find-workflow-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Verify plan artifact
        id: verify-artifact
        if: steps.find-workflow-run.outcome == 'success'
        run: |
          if [ -f "${{ inputs.working_dir }}/tfplan" ]; then
            echo "Successfully downloaded plan artifact: ${{ steps.find-workflow-run.outputs.artifact-name }}"
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "Error: tfplan file not found in artifact"
            echo "verified=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        continue-on-error: true

      - name: Read deployment ID from artifact
        id: read-deployment
        run: |
          DEPLOYMENT_ID=$(cat "${{ inputs.working_dir }}/deployment_id.txt" 2>/dev/null || echo "")
          echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT

      - name: Update deployment status - in_progress
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = '${{ steps.read-deployment.outputs.deployment_id }}';
            if (!deploymentId) return;

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt(deploymentId),
              state: 'in_progress',
              description: 'Terraform apply in progress'
            });

      - name: Terraform Init
        working-directory: ${{ inputs.working_dir }}
        run: |
          terraform init -input=false
      - name: Terraform Workspace Switch
        working-directory: ${{ inputs.working_dir }}
        run: terraform workspace new ${{inputs.environment}} 2> /dev/null || terraform workspace select ${{inputs.environment}}

      - name: Terraform Apply
        id: apply
        working-directory: ${{ inputs.working_dir }}
        run: |
          if [ -f "tfplan" ]; then
            echo "Applying pre-generated plan from artifact..."
            terraform apply -input=false tfplan
          else
            echo "Error: No plan artifact found. Cannot apply without verified plan."
            echo "Terraform apply must use a pre-generated and reviewed plan artifact."
            exit 1
          fi

      - name: Generate apply summary
        if: always()
        run: |
          echo "## Terraform Apply Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Working Directory:** \`${{ inputs.working_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.verify-artifact.outcome }}" == "success" ]; then
            echo "✅ Applied pre-generated plan from PR #${{ steps.get-pr.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Apply failed - no plan artifact found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update deployment status - success or failure
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = '${{ steps.read-deployment.outputs.deployment_id }}';
            if (!deploymentId) return;

            const applyOutcome = '${{ steps.apply.outcome }}';
            const state = applyOutcome === 'success' ? 'success' : 'failure';
            const description = applyOutcome === 'success'
              ? 'Terraform apply succeeded'
              : 'Terraform apply failed';

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt(deploymentId),
              state,
              description
            });
