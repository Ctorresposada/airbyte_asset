name: Build and Deploy dbt Image

# Trunk-based pipeline for the dbt project.
#
# PR (dbt/** changes): build, scan, push to ECR, register a new DEV task
#   definition revision. Every non-draft PR ships to dev automatically.
#
# Tag dbt-vX.X.X: promote the image already running in DEV — retag it in ECR
#   and register a new PROD task definition revision. No rebuild.
#
# Required repository variables:
#   AWS_ROLE_ARN       OIDC role in the shared service account (ECR access)
#   AWS_ROLE_ARN_DEV   OIDC role in the dev account  (ECS task def registration)
#   AWS_ROLE_ARN_PROD  OIDC role in the prod account (ECS task def registration)
#   AWS_REGION         Target region (defaults to us-east-1)

on:
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'
    types: [opened, synchronize, reopened]
  push:
    tags:
      - 'dbt-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: 'region-20-shared-dbt-core'
  DEV_TASK_FAMILY: 'region-20-dev-dbt-core'
  PROD_TASK_FAMILY: 'region-20-prod-dbt-core'

jobs:
  # ---------------------------------------------------------------------------
  # PR: build, Trivy scan, push to ECR, register new DEV task def revision.
  # ---------------------------------------------------------------------------
  build:
    name: Build and push image
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/build_and_push.yml
    with:
      aws_role_arn: ${{ vars.AWS_ROLE_ARN }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      ecr_repository: 'region-20-shared-dbt-core'
      dockerfile_path: 'dbt/Dockerfile'
      docker_context: '.'
      docker_platforms: 'linux/amd64,linux/arm64'
      trivy_severity: 'CRITICAL,HIGH'
    secrets: inherit

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false

    steps:
      - name: Configure AWS credentials (service account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-dbt-deploy-dev-svc-${{ github.run_id }}

      - name: Configure AWS credentials (DEV account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-dbt-deploy-dev-${{ github.run_id }}
          role-chaining: true

      - name: Register new DEV task definition revision
        env:
          IMAGE_URI: ${{ needs.build.outputs.image-uri }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ env.DEV_TASK_FAMILY }}" \
            --query 'taskDefinition' \
            --output json \
            | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')

          NEW_TASK_DEF=$(echo "$TASK_DEF" \
            | jq --arg IMAGE "$IMAGE_URI" '.containerDefinitions[0].image = $IMAGE')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered: $NEW_ARN"

      - name: Update DEV image URI in SSM
        env:
          IMAGE_URI: ${{ needs.build.outputs.image-uri }}
        run: |
          aws ssm put-parameter \
            --name "/region-20/dev/dbt-core/image-uri" \
            --value "$IMAGE_URI" \
            --type String \
            --overwrite

  # ---------------------------------------------------------------------------
  # Tag dbt-vX.X.X: promote the image currently running in DEV to PROD.
  # Reads the image URI from the DEV SSM parameter (the single source of truth
  # written by deploy-dev), retags it in ECR (no rebuild), then registers a new
  # PROD task definition revision.
  # ---------------------------------------------------------------------------
  promote-and-deploy-prod:
    name: Promote to PROD
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/dbt-v')

    steps:
      # Step 1: Read the current DEV image URI from the DEV SSM parameter.
      - name: Configure AWS credentials (service account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-dbt-promote-dev-svc-${{ github.run_id }}

      - name: Configure AWS credentials (DEV account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-dbt-promote-dev-${{ github.run_id }}
          role-chaining: true

      - name: Get current DEV image URI from SSM
        id: dev-image
        run: |
          IMAGE_URI=$(aws ssm get-parameter \
            --name "/region-20/dev/dbt-core/image-uri" \
            --query 'Parameter.Value' \
            --output text)

          SOURCE_TAG="${IMAGE_URI##*:}"
          echo "source_tag=$SOURCE_TAG" >> $GITHUB_OUTPUT

      # Step 2: Retag the image in ECR (no bytes moved — API-level manifest copy).
      - name: Configure AWS credentials (service account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-dbt-retag-${{ github.run_id }}

      - name: Retag image in ECR
        id: retag
        env:
          SOURCE_TAG: ${{ steps.dev-image.outputs.source_tag }}
        run: |
          # Extract semver from git tag: dbt-v1.2.3 → v1.2.3
          NEW_TAG="${GITHUB_REF_NAME#dbt-}"

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          # Fetch manifest + media type without pulling image bytes
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageTag="$SOURCE_TAG" \
            --accepted-media-types \
              "application/vnd.docker.distribution.manifest.list.v2+json" \
              "application/vnd.oci.image.index.v1+json" \
              "application/vnd.docker.distribution.manifest.v2+json" \
            --query 'images[0].imageManifest' \
            --output text)

          MEDIA_TYPE=$(aws ecr batch-get-image \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageTag="$SOURCE_TAG" \
            --query 'images[0].imageManifestMediaType' \
            --output text)

          aws ecr put-image \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-tag "$NEW_TAG" \
            --image-manifest "$MANIFEST" \
            --image-manifest-media-type "$MEDIA_TYPE"

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "uri=${REGISTRY}/${{ env.ECR_REPOSITORY }}:${NEW_TAG}" >> $GITHUB_OUTPUT

      # Step 3: Register new PROD task definition revision with the retagged image.
      - name: Configure AWS credentials (PROD account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-dbt-deploy-prod-${{ github.run_id }}
          role-chaining: true

      - name: Register new PROD task definition revision
        env:
          IMAGE_URI: ${{ steps.retag.outputs.uri }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ env.PROD_TASK_FAMILY }}" \
            --query 'taskDefinition' \
            --output json \
            | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')

          NEW_TASK_DEF=$(echo "$TASK_DEF" \
            | jq --arg IMAGE "$IMAGE_URI" '.containerDefinitions[0].image = $IMAGE')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered: $NEW_ARN"

      - name: Update PROD image URI in SSM
        env:
          IMAGE_URI: ${{ steps.retag.outputs.uri }}
        run: |
          aws ssm put-parameter \
            --name "/region-20/prod/dbt-core/image-uri" \
            --value "$IMAGE_URI" \
            --type String \
            --overwrite
