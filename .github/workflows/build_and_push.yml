name: Build and Push Docker Image to ECR

on:
  workflow_call:
    inputs:
      aws_role_arn:
        type: string
        description: AWS role to assume
      aws_region:
        type: string
        description: Target deployment region
      ecr_repository:
        type: string
        description: ECR repository where to push the built image
      dockerfile_path:
        type: string
        description: Location of the dockerfile to use
      docker_context:
        type: string
        description: Context to use for docker commands
        default: '.'
      docker_platforms:
        type: string
        description: Target deployment platforms
        default: 'linux/amd64,linux/arm64'
      docker_provenance:
        type: string
        description: Generate provenance attestation for the build
        default: 'true'
      trivy_severity:
        type: string
        description: Trivy finding severity to fail on
        default: 'CRITICAL'
      python_version:
        type: string
        description: Python version to install
        default: '3.12'
      force_build:
        type: boolean
        description: Force the build-and-push job even outside of pull_request events (used for release tag deployments)
        default: false
    outputs:
      image-tag:
        value: ${{ jobs.build-and-push.outputs.image-tag }}
      image-digest:
        value: ${{ jobs.build-and-push.outputs.image-digest }}
      image-version:
        value: ${{ jobs.build-and-push.outputs.image-version }}
      image-uri:
        value: ${{ jobs.build-and-push.outputs.image-uri }}

env:
  AWS_REGION: ${{ inputs.aws_region }}
  AWS_ROLE_ARN: ${{ inputs.aws_role_arn }}
  ECR_REPOSITORY: ${{ inputs.ecr_repository }}
  DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
  DOCKER_PLATFORMS: ${{ inputs.docker_platforms }}
  TRIVY_SEVERITY: ${{ inputs.trivy_severity }}
  TRIVY_EXIT_CODE: '1'

permissions:
  id-token: write
  contents: read
  security-events: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/requirements*.txt
            **/pyproject.toml

      - name: Install dependencies
        run: uv sync

      - name: Run linting
        run: uv tool run ruff check

      - name: Run unit tests
        run: |
          # Add your test commands here when tests are available
          # Examples:
          # uv run pytest --cov=. --cov-report=xml
          # uv run pytest tests/
          echo "Testing step - configure with your test framework"

      - name: TruffleHog OSS
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --debug --only-verified

  build-and-push:
    name: Build, Scan, and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || inputs.force_build

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-and-push.outputs.digest }}
      image-version: ${{ steps.meta.outputs.version }}
      image-uri: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        if: github.event_name == 'pull_request'
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            # Short SHA
            type=sha,format=short
            # Long SHA (always unique)
            type=sha,format=long,prefix=
            # Semantic versioning
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}-{{sha}},enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build Docker image for scanning
        id: build
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ inputs.docker_context }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}

      - name: Run Trivy vulnerability scanner (fail on issues)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0]}}
          format: 'table'
          severity: ${{ env.TRIVY_SEVERITY }}
          exit-code: ${{ env.TRIVY_EXIT_CODE }}

      - name: Build and push multi-platform image to ECR
        if: github.event_name == 'pull_request'
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ inputs.docker_context }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ inputs.docker_provenance }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}

      - name: Generate build summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.build-and-push.outcome }}" == "success" ]; then
            echo "### ✅ Build and Push Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Digest:** \`${{ steps.build-and-push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Build and Push Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const buildSuccess = '${{ steps.build-and-push.outcome }}' === 'success';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let output;
            if (buildSuccess) {
              output = `### Docker Build Results for ${{ env.ECR_REPOSITORY }}

            **Status:** ✅ Build successful and pushed to ECR
            **Image:** \`${{ env.ECR_REPOSITORY }}\`
            **Digest:** \`${{ steps.build-and-push.outputs.digest }}\`
            **Tags (SHA-based):**
            \`\`\`
            ${{ steps.meta.outputs.tags }}
            \`\`\`

            [View workflow run](${runUrl})
            `;
            } else {
              output = `### Docker Build Results for ${{ env.ECR_REPOSITORY }}

            **Status:** ❌ Build failed
            **Image:** \`${{ env.ECR_REPOSITORY }}\`

            The Docker build or push failed. Please check the workflow logs for details.

            [View workflow run](${runUrl})
            `;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
