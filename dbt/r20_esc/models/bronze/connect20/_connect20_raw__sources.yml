version: 2

sources:
  - name: connect20_evaluationinformation_raw
    description: >
      Connect20 / ESCworks evaluation files dropped into the raw landing
      zone (s3://escr20-landing-zone-raw-dev/connect20/). The Glue
      crawler `region-20-dev-connect_20-crawler` catalogs them in the
      escr20_raw_dev database. Only the Parquet table holds real data;
      the CSV is header-only and the TXT is unclassified — both ignored.
    database: awsdatacatalog
    schema: escr20_raw_dev
    tables:
      - name: connect20_evaluationinformation
        description: >
          ESCworks evaluation information records. One row per evaluation
          response with full attendee, session, and evaluation metadata.
          Schema inferred by the Glue crawler with proper types.
  - name: connect20_schedule12_raw
    description: >
      Connect20 / ESCworks schedule files dropped into the raw landing
      zone. The Glue crawler catalogs them in the escr20_raw_dev database.
    database: awsdatacatalog
    schema: escr20_raw_dev
    tables:
      - name: connect20_schedule12
        description: >
          ESCworks session schedule records. One row per session with
          logistics, budget, attendance, and metadata. Several column names
          contain spaces and are aliased to snake_case in the bronze model.
  - name: connect20_sessioninformation_raw
    description: >
      Connect20 / ESCworks session information files dropped into the raw
      landing zone. Cataloged in escr20_raw_dev by the Glue crawler.
    database: awsdatacatalog
    schema: escr20_raw_dev
    tables:
      - name: connect20_sessioninformation
        description: >
          ESCworks session attendance and registration records. One row per
          attendee per session. Several column names contain spaces or
          special characters and are aliased to snake_case in the bronze model.
