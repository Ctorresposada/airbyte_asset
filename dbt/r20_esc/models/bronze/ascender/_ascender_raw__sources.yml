version: 2

sources:
  - name: ascender_raw
    description: >
      Ascender invoice files dropped daily into the raw landing zone
      (s3://escr20-landing-zone-raw-<env>/ascender/invoice/). The Glue table
      is manually managed by Crawler with OpenCSVSerde and all 70
      columns typed as STRING to prevent type inference failures on values like
      scientific notation numbers (e.g. 2.02304E+15) or dates stored as
      integers (e.g. 20250603). Type casting is handled in this bronze model.
    database: awsdatacatalog
    schema: escr20_raw_dev
    tables:
      - name: ascender_invoice
        description: >
          Daily invoice export from Ascender. One row per invoice line item.
          File naming convention: invoice_YYYYMMDDHHMMSS.csv. The Glue table
          location points to the entire folder so all daily files are included
          in every query. The '$path' virtual column is used to identify the
          source file append the latest file/data into bronze daily.
