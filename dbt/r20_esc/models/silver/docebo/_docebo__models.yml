version: 2

models:
  - name: stg_docebo__users
    description: "Docebo LMS users — one row per user_id"
    columns:
      - name: user_id
        description: "PK — Docebo user identifier"
        tests:
          - not_null
          - unique

  - name: stg_docebo__courses
    description: "Docebo LMS courses — all statuses retained, gold filters"
    columns:
      - name: course_id
        description: "PK — Docebo course identifier"
        tests:
          - not_null
          - unique

  - name: stg_docebo__enrollments
    description: "Docebo LMS enrollments — one row per (user_id, course_id)"
    columns:
      - name: user_id
        description: "FK to stg_docebo__users.user_id"
        tests:
          - not_null
      - name: course_id
        description: "FK to stg_docebo__courses.course_id"
        tests:
          - not_null

  - name: stg_docebo__orgchart
    description: "Docebo branches / hierarchical organizational tree"
    columns:
      - name: branch_id
        description: "PK — branch identifier"
        tests:
          - not_null
          - unique

  - name: stg_docebo__course_status
    description: "Current publication status per course (latest by _airbyte_extracted_at)"
    columns:
      - name: course_id
        description: "PK — course identifier; FK to stg_docebo__courses.course_id"
        tests:
          - not_null
          - unique
