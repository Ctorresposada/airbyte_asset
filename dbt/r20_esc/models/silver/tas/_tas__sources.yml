version: 2

sources:
  - name: tas
    description: >
      TAS (Time Activity System) — SQL Server tables ingested via Airbyte
      through bastion. Glue tables use the tas_sqserver_vw_ prefix; we keep
      logical names unprefixed here via `identifier:` so staging SQL stays
      portable.
    database: awsdatacatalog
    schema: escr20_bronze_dev
    tables:
      - name: activity_code
        identifier: tas_sqserver_vw_activity_code
        description: "Códigos de atividade do TAS"
      - name: campus
        identifier: tas_sqserver_vw_campus
        description: "Campus do TAS"
      - name: client
        identifier: tas_sqserver_vw_client
        description: "Clientes do TAS"
      - name: program
        identifier: tas_sqserver_vw_program
        description: "Programas do TAS"
      - name: timesheet
        identifier: tas_sqserver_vw_timesheet
        description: "Timesheets (registros de tempo) do TAS"
      - name: users
        identifier: tas_sqserver_vw_users
        description: "Usuários do TAS"
