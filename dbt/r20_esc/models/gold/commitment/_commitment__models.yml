version: 2

models:
  - name: dim_cmt_period
    description: "Dimensão de períodos de commitment"
    columns:
      - name: period_id
        description: "PK — identificador do período"
        tests:
          - not_null
          - unique

  - name: dim_contact
    description: "Dimensão de contatos ESC"
    columns:
      - name: contact_id
        description: "PK — identificador do contato"
        tests:
          - not_null
          - unique

  - name: fct_cmt_offering
    description: >
      Fact table de commitment offerings por período.
      Filtrada pelo var commitment_period_id (default 19).
      Colunas cmt_manager1-3, count_type_used, tot_al, conditions,
      condition_details e market_price retornam NULL até que as tabelas
      esc_employee_data, cmt_count_type e cmt_category sejam ingeridas.
    columns:
      - name: cmt_form_id
        description: "PK — identificador do formulário de commitment"
        tests:
          - not_null
